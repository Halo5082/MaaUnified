name: Build MAAUnified (Standalone UI Repo)

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore app
        run: dotnet restore App/MAAUnified.App.csproj

      - name: Restore tests
        run: dotnet restore Tests/MAAUnified.Tests.csproj

      - name: Build app
        run: dotnet build App/MAAUnified.App.csproj -c Release --no-restore

      - name: Build tests
        run: dotnet build Tests/MAAUnified.Tests.csproj -c Release --no-restore

      - name: Run tests
        run: dotnet test Tests/MAAUnified.Tests.csproj -c Release --no-build --logger "console;verbosity=minimal"
